# Full ReFrame-VLM: frame tokens + consistency loss + view permutation

mode: full
model_path: models/qwen25-vl-7b
train_data: data/processed/train.jsonl
consistency_pairs: data/processed/consistency_pairs.jsonl
output_dir: checkpoints/full

# LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# Frame tokens
use_frame_tokens: true

# Consistency loss
lambda_consistency: 0.1       # Grid search: 0.05, 0.1, 0.2, 0.3
canonical_dim: 64

# View augmentation
view_permutation: true
view_permutation_prob: 0.5

# Training
num_epochs: 3
batch_size: 2
gradient_accumulation: 32
learning_rate: 2.0e-5
scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 2048

# Hardware
bf16: true
gradient_checkpointing: true
num_workers: 4

# Logging
logging_steps: 10
save_strategy: epoch
save_total_limit: 2
report_to: wandb
run_name: reframe_full
seed: 42
