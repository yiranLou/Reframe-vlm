# SAF-LoRA: semantically anchored frame-gated LoRA.
# Combines three signals under one fair one-epoch recipe:
#   1) learned <frame_*> token
#   2) natural-language frame instruction
#   3) semantic residual gate in LoRA parameter space

mode: token_gated
model_path: models/qwen25-vl-7b
train_data: data/processed/train.jsonl
output_dir: checkpoints/saf_lora

# LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# Conditioning
use_frame_tokens: true
use_frame_text_prompt: true
use_semantic_frame_gating: true

# Training — match one-epoch comparison recipe
num_epochs: 1
batch_size: 4
gradient_accumulation: 16
learning_rate: 2.0e-5
scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 768

# Hardware
bf16: true
gradient_checkpointing: true
num_workers: 4

# Logging
logging_steps: 10
save_strategy: epoch
save_total_limit: 1
report_to: wandb
run_name: reframe_saf_lora
seed: 42
