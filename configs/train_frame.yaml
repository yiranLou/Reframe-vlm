# Frame-Conditioned LoRA: + frame special tokens, no consistency loss
# Tests frame conditioning in isolation

mode: frame
model_path: models/qwen25-vl-7b
train_data: data/processed/train.jsonl
output_dir: checkpoints/frame_lora

# LoRA
lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

# Frame tokens
use_frame_tokens: true

# View augmentation
view_permutation: false
view_permutation_prob: 0.5

# Training
num_epochs: 3
batch_size: 4
gradient_accumulation: 16
learning_rate: 2.0e-5
scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 512

# Hardware
bf16: true
gradient_checkpointing: true
num_workers: 4

# Logging
logging_steps: 10
save_strategy: epoch
save_total_limit: 2
report_to: wandb
run_name: reframe_frame_lora
seed: 42
