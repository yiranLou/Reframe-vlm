# Ablation: remove view permutation augmentation

mode: full
model_path: models/qwen25-vl-7b
train_data: data/processed/train.jsonl
consistency_pairs: data/processed/consistency_pairs.jsonl
output_dir: checkpoints/ablation_no_permutation

lora_rank: 64
lora_alpha: 128
lora_dropout: 0.05

use_frame_tokens: true
lambda_consistency: 0.1
canonical_dim: 64

# KEY CHANGE: no view permutation
view_permutation: false

num_epochs: 3
batch_size: 4
gradient_accumulation: 16
learning_rate: 2.0e-5
scheduler: cosine
warmup_ratio: 0.05
weight_decay: 0.01
max_length: 512
bf16: true
gradient_checkpointing: true
num_workers: 4

logging_steps: 10
save_strategy: epoch
save_total_limit: 2
report_to: wandb
run_name: ablation_no_permutation
seed: 42
